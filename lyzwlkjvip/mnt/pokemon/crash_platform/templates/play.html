{% extends "dashboard.html" %}

{% block head %}
	<style>
		.p {
			margin-left: 15px;
		}
	</style>
{% end %}

{% block main %}
	<div class="row m-head">
		<div class="col-lg-2 col-md-2 col-sm-3 col-xs-3"><h4>Tra cứu báo cáo client<h4></div>
	</div>

	<div class="well">
		<div class="row">
			<div class="form-group col-lg-2 col-md-3 col-sm-4">
				<div class="input-group date form-date">
					<input id="s-time" type="text" class="form-control input-sm" placeholder="Chọn thời gian bắt đầu">
					<span class="input-group-addon"><span class="glyphicon glyphicon-remove"></span></span>
				</div>
			</div>
			<span class="pull-left"><strong>đến</strong></span>
			<div class="form-group col-lg-2 col-md-3 col-sm-4">
				<div class="input-group date form-date">
					<input id="e-time" type="text" class="form-control input-sm" placeholder="Chọn thời gian kết thúc">
					<span class="input-group-addon"><span class="glyphicon glyphicon-remove"></span></span>
				</div>
			</div>
			<span class="pull-left"><strong>ID nhân vật</strong></span>
			<div class="form-group col-lg-2 col-md-3 col-sm-4">
				<input id="role_id" type="text" class="form-control input-sm" placeholder="ID nhân vật">
			</div>
			<div class="pull-left p" style="width: 51px;">
				<button id="query" class="form-control input-sm btn-success" type="button">Tra cứu</button>
			</div>
		</div>
	</div>

	<div class="row">
		<div class="col-lg-12">
			<div class="well">
				<table id="battle-table"></table>
			</div>
		</div>
	</div>

{% end %}

{% block foot %}
<script>
	var Columns = [
		{field: "id", title: "STT"},
		{field: "serv_key", title: "Máy chủ"},
		{field: "play_id", title: "PlayId"},
		{field: "scene_id", title: "SceneId"},
		{field: "ident", title: "Mô tả lỗi"},
		{field: "report_time", title: "Thời gian báo lỗi"},
		{field: "desc", title: "Mô tả người chơi"},
		{field: "op", title: "", formatter: function(value, row, index) {
			return `<a href="/play_report/query?type=download&play_id=${row.play_id}" download="${row.scene_id}_${row.play_id}.record">Tải về</a>`
		}},
	]

	$(function() {
		$("div.sidebar ul.nav a").each(function(){
			$(this).removeClass("s-active")
		});
		$("#play-show").addClass("s-active");
		initDatetimePicker();
		paddingInputDate($("#s-time"));
		paddingInputDate($("#e-time"));

		$("#query").on("click", function() {
			var stime = $('#s-time').val();
			var etime = $('#e-time').val();
			var role_id = $('#role_id').val();
			if (!stime || !etime) {
				alert('Vui lòng chọn khoảng thời gian.');
				return;
			}

			$('#battle-table').bootstrapTable("destroy")
			$('#battle-table').bootstrapTable({
				url: '/play_report/query',
				method: 'post',
				dataType: "json",
				striped: false,
				pagination: true,
				sidePagination: "server",
				pageNumber: 1,
				pageSize: 10,
				pageList: [20, 30, 40, 50],
				sortName: "report_time",
				sortOrder: -1,
				classes: "table table-hover table-no-bordered",
				columns: Columns,
				detailView: true,
				detailFormatter: function(index, row) {
					return `<pre>${row.traceback}</pre>`
				},
				queryParams: function(params) {
					params.stime = stime
					params.etime = etime
					params.role_id = role_id
					return params
				},
				responseHandler: function(res) {
					return {
						"total": res.total,
						"rows": res.rows,
						"limit": res.limit,
						"offset": res.offset,
					}
				},
				onClickRow:function (row, ele) {
					console.log(row, ele)
				},
			});
		})
	})
</script>

{% end %}
